name: wallet-api-ci-cd-azure

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  APP_DIR: lab-02-acr-container-apps/src/Lab02.WalletMinimal

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        working-directory: ${{ env.APP_DIR }}
        run: dotnet restore Lab02.WalletMinimal.sln
      - name: Build
        working-directory: ${{ env.APP_DIR }}
        run: dotnet build Lab02.WalletMinimal.sln --configuration Release --no-restore

  deploy:
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ${{ env.APP_DIR }}
        run: |
          az acr login --name "$ACR_NAME"
          docker build -t "$ACR_NAME.azurecr.io/wallet-api:$IMAGE_TAG" .
          docker push "$ACR_NAME.azurecr.io/wallet-api:$IMAGE_TAG"
          az containerapp update --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --image "$ACR_NAME.azurecr.io/wallet-api:$IMAGE_TAG"

