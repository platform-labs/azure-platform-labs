apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wallet-api
  namespace: argocd
spec:
  project: csnp-lab
  source:
    repoURL: REPLACE_REPOSITORY_URL
    targetRevision: main
    path: platforms/azure/labs/lab-10-aks/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: wallet
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

